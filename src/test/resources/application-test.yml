spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: never   # skip init.sql in tests

  kafka:
    bootstrap-servers: localhost:9092

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=60s
    cache-names:
      - telemetry-l1

toolkit:
  async:
    core-pool-size: 2
    max-pool-size: 4
    queue-capacity: 100
  cache:
    l2-ttl-seconds: 300
  db:
    batch-insert-size: 50
